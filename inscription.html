<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Service — Proposer mes articles</title>
<meta name="robots" content="noindex">
<style>
/* ===================== VARIABLES DE COULEUR ===================== */
:root{
  --blanc:#ffffff;
  --noir:#1a1a1a;
  --gris-bordure:#d9d9d9;
  --gris-fond:#f6f6f7;
  --bleu:#2563eb;
  --bleu-hover:#1d4ed8;
  --orange:#f97316;
  --rayon:10px;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:-apple-system, "Segoe UI", Roboto, Arial, sans-serif; /* polices système = 0 Ko à télécharger */
  background:var(--blanc);
  color:var(--noir);
}

/* ===================== ENTETE ===================== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 18px;
  background:var(--noir);
  position:sticky;
  top:0;
  z-index:10;
}
.logo{
  color:var(--blanc);
  font-size:22px;
  font-weight:700;
  cursor:pointer;
}
.logo-accent{ color:var(--orange); }

.header-right{ display:flex; gap:10px; align-items:center; }

.btn-retour{
  background:transparent;
  border:1px solid var(--blanc);
  color:var(--blanc);
  padding:8px 14px;
  border-radius:var(--rayon);
  cursor:pointer;
}

.btn-panier{
  background:var(--bleu);
  color:var(--blanc);
  border:none;
  padding:10px 16px;
  border-radius:var(--rayon);
  cursor:pointer;
  font-weight:600;
}
.btn-panier:hover{ background:var(--bleu-hover); }

.btn-options{
  background:transparent;
  border:1px solid var(--blanc);
  color:var(--blanc);
  width:38px; height:38px;
  border-radius:var(--rayon);
  cursor:pointer;
  font-size:16px;
}
.btn-options:hover{ background:rgba(255,255,255,.1); }

.badge{
  background:var(--orange);
  color:var(--blanc);
  border-radius:999px;
  padding:2px 8px;
  font-size:12px;
  margin-left:4px;
}

/* ===================== CONTENU GENERAL ===================== */
main{ max-width:1200px; margin:0 auto; padding:20px 16px 60px; }

.hero{ text-align:center; padding:36px 10px 14px; }
.hero h1{ font-size:36px; margin-bottom:10px; letter-spacing:-0.5px; }
.hero-baseline{
  display:inline-block;
  color:var(--noir);
  font-size:17px;
  font-weight:600;
  margin:0;
  padding:8px 18px;
  border-radius:999px;
  background:var(--gris-fond);
  border:1px solid var(--gris-bordure);
}
.hero-baseline::before{ content:"🚚 "; }

.titre-section{
  font-size:22px;
  margin:10px 0 20px;
  border-left:5px solid var(--orange);
  padding-left:10px;
}

/* ===================== GRILLE CATEGORIES (ACCUEIL) ===================== */
.grille-categories{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:20px;
  margin-top:24px;
}
.carte-categorie{
  border:1px solid var(--gris-bordure);
  border-radius:var(--rayon);
  padding:24px 14px;
  text-align:center;
  cursor:pointer;
  background:var(--gris-fond);
  transition:transform .15s ease, border-color .15s ease;
}
.carte-categorie:hover{
  transform:translateY(-3px);
  border-color:var(--bleu);
}
.carte-categorie .icone{ font-size:40px; display:block; margin-bottom:10px; }
.carte-categorie h3{ margin:6px 0 4px; }
.carte-categorie p{ color:#666; font-size:13px; margin:0; }

/* ===================== GRILLE PRODUITS (CATALOGUE) ===================== */
.grille-produits{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:22px; /* espacement demandé entre les articles */
}

.carte-produit{
  border:1px solid var(--gris-bordure); /* contour grisâtre demandé */
  border-radius:var(--rayon);
  padding:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  background:var(--blanc);
}

.carte-produit .icone-produit{
  font-size:44px;
  margin-bottom:10px;
}
.carte-produit h4{
  margin:4px 0;
  font-size:14px;
  min-height:36px;
}
.carte-produit .prix{
  font-weight:700;
  color:var(--noir);
  margin:4px 0 10px;
}

.btn-ajouter{
  background:var(--bleu);
  color:var(--blanc);
  border:none;
  padding:9px 14px;
  border-radius:var(--rayon); /* rectangle à bords arrondis, comme demandé */
  cursor:pointer;
  font-weight:600;
  width:100%;
}
.btn-ajouter:hover{ background:var(--bleu-hover); }

/* ===================== PANIER ===================== */
.liste-panier{ display:flex; flex-direction:column; gap:12px; }

.ligne-panier{
  display:flex;
  align-items:center;
  justify-content:space-between;
  border:1px solid var(--gris-bordure);
  border-radius:var(--rayon);
  padding:12px 14px;
}
.ligne-panier .info-produit{ display:flex; align-items:center; gap:12px; }
.ligne-panier .icone-produit{ font-size:28px; }
.ligne-panier .quantite{ display:flex; align-items:center; gap:8px; }
.ligne-panier button{
  border:1px solid var(--gris-bordure);
  background:var(--gris-fond);
  border-radius:6px;
  width:26px; height:26px;
  cursor:pointer;
}
.btn-supprimer{
  color:#c0392b;
  background:transparent;
  border:none;
  cursor:pointer;
  font-size:13px;
}

.panier-vide{ text-align:center; color:#666; padding:30px 0; }

.recap-panier{
  display:flex;
  justify-content:space-between;
  font-size:18px;
  font-weight:700;
  border-top:2px solid var(--noir);
  padding-top:14px;
  margin-top:16px;
}

.btn-principal{
  display:block;
  width:100%;
  background:var(--bleu);
  color:var(--blanc);
  border:none;
  padding:14px;
  border-radius:var(--rayon);
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  margin-top:18px;
}
.btn-principal:hover{ background:var(--bleu-hover); }

.btn-secondaire{
  background:var(--orange);
  color:var(--blanc);
  border:none;
  padding:10px 14px;
  border-radius:var(--rayon);
  cursor:pointer;
  font-weight:600;
  margin:6px 0;
}

/* ===================== FORMULAIRE ===================== */
.label{ display:block; margin:14px 0 6px; font-weight:600; font-size:14px; }
.champ{
  width:100%;
  padding:11px 12px;
  border:1px solid var(--gris-bordure);
  border-radius:var(--rayon);
  font-size:15px;
}
.statut-position{ font-size:13px; color:#666; margin:4px 0 0; }
.statut-envoi{ font-size:14px; margin-top:10px; font-weight:600; }

/* ===================== ESPACE VENDEUR ===================== */
.cadre-photo{
  display:flex;
  align-items:center;
  justify-content:center;
  width:160px;
  height:160px;
  margin:0 auto 18px;
  border:2px dashed var(--gris-bordure);
  border-radius:var(--rayon);
  cursor:pointer;
  background:var(--gris-fond);
  overflow:hidden;
  position:relative;
}
.cadre-photo:hover{ border-color:var(--bleu); }
#signePlus{ font-size:48px; color:#999; font-weight:300; }
.cadre-photo img{ width:100%; height:100%; object-fit:cover; }

.ligne-position{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.ligne-position .champ{ flex:1; min-width:180px; }

.cases-a-cocher{
  display:flex;
  flex-direction:column;
  gap:8px;
  border:1px solid var(--gris-bordure);
  border-radius:var(--rayon);
  padding:12px 14px;
  max-height:220px;
  overflow-y:auto;
}
.cases-a-cocher label{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
  font-weight:400;
  cursor:pointer;
}

.btn-retour-lien{
  display:block;
  margin:12px auto 0;
  background:none;
  border:none;
  color:#666;
  text-decoration:underline;
  cursor:pointer;
  font-size:14px;
}

/* ===================== PAGE DE REMERCIEMENT ===================== */
.carte-merci{
  max-width:420px;
  margin:40px auto;
  text-align:center;
  border:1px solid var(--gris-bordure);
  border-radius:var(--rayon);
  padding:36px 24px;
}
.icone-merci{
  font-size:56px;
  margin-bottom:6px;
  animation: rebondirColis 1.4s ease-in-out infinite;
}
@keyframes rebondirColis{
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.carte-merci h2{ margin:10px 0 6px; }
.carte-merci p{ color:#555; }
.bloc-paiement{
  background:var(--gris-fond);
  border:1px solid var(--gris-bordure);
  border-radius:var(--rayon);
  padding:16px;
  margin:22px 0;
}
.label-paiement{ margin:0 0 6px; font-size:14px; color:#555; }
.numero-paiement{
  margin:0;
  font-size:28px;
  font-weight:800;
  color:var(--bleu);
  letter-spacing:1px;
}
.sous-texte-paiement{ margin:6px 0 0; font-size:13px; color:var(--orange); font-weight:600; }

.bloc-instructions{
  text-align:left;
  border:1px solid var(--gris-bordure);
  border-radius:var(--rayon);
  padding:16px 18px;
  margin:0 0 20px;
}
.bloc-instructions h3{ margin:0 0 10px; font-size:15px; }
.sous-titre-instruction{
  font-size:13.5px;
  font-weight:700;
  margin:14px 0 6px;
  color:var(--noir);
}
.bloc-instructions ol{ margin:0; padding-left:20px; }
.bloc-instructions li{ margin-bottom:6px; font-size:14px; color:#333; }
.astuce-instruction{ margin:10px 0 0; font-size:12.5px; color:#666; }

/* ===================== ANIMATION AJOUT AU PANIER ===================== */
.clone-vol{
  transition: all .6s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
  border-radius:8px;
  object-fit:cover;
}

@keyframes secousseBadge{
  0%, 100% { transform: scale(1); }
  30% { transform: scale(1.5); }
  60% { transform: scale(0.9); }
}
.badge.anime{ animation: secousseBadge .5s ease; }

@keyframes confirmationAjout{
  0% { transform: scale(1); }
  50% { transform: scale(0.94); }
  100% { transform: scale(1); }
}
.btn-ajouter.confirme{
  background:#16a34a !important;
  animation: confirmationAjout .3s ease;
}

/* ===================== MODALE ===================== */
.modale{
  position:fixed; inset:0;
  background:rgba(0,0,0,.5);
  display:flex; align-items:center; justify-content:center;
  padding:20px;
  z-index:100;
}
.modale-contenu{
  background:var(--blanc);
  border-radius:var(--rayon);
  padding:24px;
  max-width:360px;
  text-align:center;
}
.modale-boutons{ display:flex; gap:10px; margin-top:18px; }
.btn-vert{
  flex:1; background:#16a34a; color:var(--blanc); border:none;
  padding:12px; border-radius:var(--rayon); cursor:pointer; font-weight:600;
}
.btn-rouge{
  flex:1; background:#dc2626; color:var(--blanc); border:none;
  padding:12px; border-radius:var(--rayon); cursor:pointer; font-weight:600;
}

/* ===================== ECRAN "SITE EN PAUSE" ===================== */
.ecran-pause{
  position:fixed; inset:0;
  background:var(--blanc);
  z-index:200;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.carte-pause{
  max-width:420px;
  text-align:center;
}
.carte-pause .icone-pause{ font-size:56px; margin-bottom:10px; }
.carte-pause h2{ margin:0 0 10px; }
.carte-pause p{ color:#555; }
.raison-pause{
  background:var(--gris-fond);
  border:1px solid var(--gris-bordure);
  border-radius:var(--rayon);
  padding:12px 16px;
  margin:16px 0;
  font-weight:600;
}
.lien-admin-pause{
  display:inline-block;
  margin-top:14px;
  font-size:13px;
  color:#888;
  text-decoration:underline;
  cursor:pointer;
  background:none;
  border:none;
}

/* ===================== BOUTON INSTALLER L'APPLICATION ===================== */
.bloc-installer{
  text-align:center;
  margin-top:28px;
}
.btn-installer{
  background:var(--noir);
  color:var(--blanc);
  border:none;
  padding:13px 22px;
  border-radius:var(--rayon);
  font-weight:700;
  cursor:pointer;
  font-size:15px;
}
.btn-installer:hover{ opacity:.88; }
.texte-installer{
  font-size:12.5px;
  color:#777;
  margin-top:8px;
}

/* ===================== ADMIN : PAUSE DU SITE ===================== */
.bloc-pause-admin{
  border:1px solid var(--gris-bordure);
  border-radius:var(--rayon);
  padding:16px;
  margin-top:22px;
}
.btn-pause{
  background:#dc2626;
  color:var(--blanc);
  border:none;
  padding:11px 16px;
  border-radius:var(--rayon);
  cursor:pointer;
  font-weight:700;
  width:100%;
}
.btn-reprendre{
  background:#16a34a;
  color:var(--blanc);
  border:none;
  padding:11px 16px;
  border-radius:var(--rayon);
  cursor:pointer;
  font-weight:700;
  width:100%;
}
/* ===================== MUR "RESERVE AUX ADMINISTRATEURS" ===================== */
.connecte-en-tant-que{
  font-size:12.5px;
  color:#16a34a;
  background:#f0fdf4;
  border:1px solid #bbf7d0;
  border-radius:8px;
  padding:8px 10px;
  margin:0 0 12px;
}

.carte-restriction{
  text-align:center;
  border:1px solid var(--gris-bordure);
  border-radius:var(--rayon);
  padding:40px 20px;
  background:var(--gris-fond);
}
.icone-restriction{ font-size:44px; margin-bottom:10px; }
.carte-restriction p{ color:#555; margin:0 0 16px; }
.lien-discret{
  background:none;
  border:none;
  color:#999;
  text-decoration:underline;
  font-size:12.5px;
  cursor:pointer;
}
.btn-google{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:var(--blanc);
  border:1px solid var(--gris-bordure);
  border-radius:var(--rayon);
  padding:12px 20px;
  font-size:15px;
  font-weight:600;
  color:var(--noir);
  cursor:pointer;
}
.btn-google:hover{ border-color:var(--bleu); background:var(--gris-fond); }

/* ===================== GESTION DES ARTICLES / DEMANDES ===================== */
.liste-gestion{ display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
.ligne-gestion{
  display:flex;
  align-items:center;
  gap:12px;
  border:1px solid var(--gris-bordure);
  border-radius:var(--rayon);
  padding:10px 12px;
}
.miniature-gestion{
  width:44px; height:44px;
  object-fit:cover;
  border-radius:8px;
  flex-shrink:0;
}
.info-gestion{ flex:1; min-width:0; }
.info-gestion strong{ display:block; font-size:14px; }
.details-gestion{ font-size:12px; color:#666; margin-top:2px; }
.boutons-gestion{ display:flex; gap:6px; flex-shrink:0; }
.btn-modifier, .btn-supprimer-gestion{
  border:1px solid var(--gris-bordure);
  background:var(--blanc);
  border-radius:8px;
  width:34px; height:34px;
  cursor:pointer;
  font-size:15px;
}
.btn-modifier:hover{ border-color:var(--bleu); }
.btn-supprimer-gestion:hover{ border-color:#dc2626; }

/* ===================== NOM BOUTIQUE / STOCK SUR LES CARTES PRODUIT ===================== */
.nom-boutique-produit{
  font-size:11.5px;
  color:#777;
  margin:0 0 2px;
}
.stock-produit{
  font-size:11px;
  color:var(--orange);
  font-weight:600;
  margin:0 0 8px;
}

/* ===================== PAGE INSCRIPTION (soumission boutiquiers) ===================== */
.grille-photos-inscription{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(130px, 1fr));
  gap:14px;
  margin-bottom:6px;
}
.cadre-photo-inscription{ width:100%; height:130px; margin:0; }
.carte-photo-inscription{
  border:1px solid var(--gris-bordure);
  border-radius:var(--rayon);
  padding:8px;
  position:relative;
}
.apercu-photo-inscription{
  width:100%;
  height:100px;
  object-fit:cover;
  border-radius:8px;
}
.btn-retirer-photo{
  position:absolute;
  top:4px; right:4px;
  width:22px; height:22px;
  border-radius:50%;
  border:none;
  background:rgba(0,0,0,.6);
  color:var(--blanc);
  cursor:pointer;
  font-size:12px;
  line-height:1;
}
.carte-photo-inscription .prix-photo{ margin-top:4px; }

/* Demande explicite : le catalogue reste TOUJOURS en 5 colonnes,
   (padding, police, icônes) plutôt que le nombre de colonnes. */
@media (max-width: 900px){
  .grille-produits{ gap:12px; }
  .carte-produit{ padding:8px; }
  .carte-produit .icone-produit{ font-size:26px; }
  .carte-produit h4{ font-size:11px; min-height:28px; }
  .carte-produit .prix{ font-size:12px; }
  .btn-ajouter{ padding:6px 4px; font-size:11px; }
}
@media (max-width: 600px){
  .grille-categories{ grid-template-columns:1fr; }
  .grille-produits{ gap:8px; }
  .carte-produit{ padding:6px; }
  .carte-produit .icone-produit{ font-size:20px; margin-bottom:4px; }
  .carte-produit h4{ font-size:9.5px; min-height:24px; margin:2px 0; }
  .carte-produit .prix{ font-size:10.5px; margin:2px 0 6px; }
  .btn-ajouter{ padding:5px 2px; font-size:9.5px; border-radius:6px; }
  .header-right{ gap:6px; }
  .btn-retour{ padding:8px 10px; font-size:13px; }
  .hero h1{ font-size:26px; }
}
@media (max-width: 380px){
  .carte-produit h4{ font-size:8.5px; }
  .carte-produit .prix{ font-size:9.5px; }
  .btn-ajouter{ font-size:8.5px; padding:4px 2px; }
}

<body>

<header class="header">
  <div class="header-left">
    <span class="logo">Prime<span class="logo-accent">Service</span></span>
  </div>
</header>

<main id="main" style="max-width:520px;">

  <section class="vue" id="vue-formulaire">
    <div class="hero" style="padding-top:16px;">
      <h1 style="font-size:24px;">Proposez vos articles</h1>
      <p class="hero-baseline">Ajoutez vos photos, on s'occupe du reste 🚀</p>
    </div>

    <form id="formInscription" onsubmit="return envoyerSoumission(event)">

      <label class="label">Vos photos d'articles (une photo = un article)</label>
      <div id="grillePhotos" class="grille-photos-inscription">
        <label class="cadre-photo cadre-photo-inscription" id="boutonAjouterPhoto">
          <span id="signePlusInscription">+</span>
          <input type="file" accept="image/*" id="inputPhoto" style="display:none;" onchange="ajouterPhoto(event)">
        </label>
      </div>
      <p id="statutPhotos" class="statut-position">Ajoutez au moins une photo pour continuer.</p>

      <label class="label">Votre nom complet</label>
      <input type="text" id="nomSoumissionnaire" class="champ" placeholder="Ex : Awa Traoré" required>

      <label class="label">Votre numéro de téléphone</label>
      <input type="tel" id="telephoneSoumissionnaire" class="champ" placeholder="Ex : 76 12 34 56" pattern="[0-9+ ]{8,15}" inputmode="numeric" title="Entrez un vrai numéro de téléphone" required>

      <label class="label">Votre position (obligatoire)</label>
      <button type="button" class="btn-secondaire" onclick="recupererPositionInscription()">
        📍 Utiliser ma position actuelle
      </button>
      <p id="statutPositionInscription" class="statut-position">Position non récupérée</p>
      <input type="hidden" id="latInscription">
      <input type="hidden" id="lngInscription">

      <button type="submit" id="btnEnvoyerInscription" class="btn-principal" style="margin-top:20px;">
        Envoyer ma demande
      </button>
      <p id="statutInscription" class="statut-envoi"></p>
    </form>
  </section>

  <section class="vue" id="vue-merci-inscription" style="display:none;">
    <div class="carte-merci">
      <div class="icone-merci">✅</div>
      <h2>Demande envoyée !</h2>
      <p>Merci ! Prime Service va examiner vos articles et vous contactera si vos articles sont publiés sur le site.</p>
    </div>
  </section>

</main>

<script>
/* =====================================================================
   CONFIGURATION
   ===================================================================== */
const CONFIG = {
  DISCORD_WEBHOOK_URL: "https://discord.com/api/webhooks/1527664130838757526/ImLvQwT_ZKk7WRSrMjyCh9_Xy5v0lp8Hwlw6wyoKOUcxreF8FC7M83L4QfABu_SVb513",
};

/* =====================================================================
   PHOTOS + PRIX (chaque photo ajoutée devient un article candidat)
   ===================================================================== */
let photosAjoutees = []; // { id, fichier, apercuUrl }
let compteurPhoto = 0;

function ajouterPhoto(event){
  const fichier = event.target.files[0];
  if(!fichier) return;

  compteurPhoto++;
  const id = compteurPhoto;
  const apercuUrl = URL.createObjectURL(fichier);
  photosAjoutees.push({ id, fichier, apercuUrl });

  redessinerPhotos();
  event.target.value = ""; // permet de resélectionner le même fichier si besoin
}

function retirerPhoto(id){
  photosAjoutees = photosAjoutees.filter(p => p.id !== id);
  redessinerPhotos();
}

function redessinerPhotos(){
  const grille = document.getElementById("grillePhotos");
  const statut = document.getElementById("statutPhotos");

  const cartesPhotos = photosAjoutees.map((p, index) => `
    <div class="carte-photo-inscription">
      <button type="button" class="btn-retirer-photo" onclick="retirerPhoto(${p.id})">✕</button>
      <img src="${p.apercuUrl}" class="apercu-photo-inscription">
      <label class="label" style="margin-top:8px;">Prix de l'article ${index + 1} (FCFA)</label>
      <input type="number" class="champ prix-photo" data-photo-id="${p.id}" placeholder="Ex : 5000" min="1" required>
    </div>
  `).join("");

  const boutonAjouter = `
    <label class="cadre-photo cadre-photo-inscription" id="boutonAjouterPhoto">
      <span id="signePlusInscription">+</span>
      <input type="file" accept="image/*" id="inputPhoto" style="display:none;" onchange="ajouterPhoto(event)">
    </label>
  `;

  grille.innerHTML = cartesPhotos + boutonAjouter;

  statut.textContent = photosAjoutees.length === 0
    ? "Ajoutez au moins une photo pour continuer."
    : `${photosAjoutees.length} article(s) prêt(s) à être envoyé(s).`;
}

document.addEventListener("click", function(e){
  if(e.target.id === "boutonAjouterPhoto" || e.target.id === "signePlusInscription" || e.target.closest("#boutonAjouterPhoto")){
    const input = document.getElementById("inputPhoto");
    if(input) input.click();
  }
});

/* =====================================================================
   GEOLOCALISATION (obligatoire)
   ===================================================================== */
function recupererPositionInscription(){
  const statut = document.getElementById("statutPositionInscription");

  if(!navigator.geolocation){
    statut.textContent = "❌ Votre navigateur ne supporte pas la géolocalisation.";
    return;
  }

  statut.textContent = "📡 Recherche de votre position...";

  navigator.geolocation.getCurrentPosition(
    (position) => {
      document.getElementById("latInscription").value = position.coords.latitude;
      document.getElementById("lngInscription").value = position.coords.longitude;
      statut.textContent = "✅ Position récupérée avec succès.";
      statut.style.color = "#16a34a";
    },
    () => {
      statut.textContent = "❌ Impossible de récupérer votre position. Activez votre GPS et réessayez.";
      statut.style.color = "#dc2626";
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

/* =====================================================================
   ENVOI DE LA DEMANDE — directement vers Discord (photos jointes)
   ===================================================================== */
async function envoyerSoumission(event){
  event.preventDefault();

  const nom = document.getElementById("nomSoumissionnaire").value.trim();
  const telephone = document.getElementById("telephoneSoumissionnaire").value.trim();
  const lat = document.getElementById("latInscription").value;
  const lng = document.getElementById("lngInscription").value;
  const statut = document.getElementById("statutInscription");
  const bouton = document.getElementById("btnEnvoyerInscription");

  if(photosAjoutees.length === 0){
    statut.style.color = "#dc2626";
    statut.textContent = "⚠️ Ajoutez au moins une photo avant d'envoyer.";
    return false;
  }

  if(!lat || !lng){
    statut.style.color = "#dc2626";
    statut.textContent = "⚠️ Merci de récupérer votre position avant d'envoyer.";
    return false;
  }

  // Vérifie que chaque photo a bien un prix rempli
  const champsPrix = Array.from(document.querySelectorAll(".prix-photo"));
  for(const champ of champsPrix){
    if(!champ.value || Number(champ.value) < 1){
      statut.style.color = "#dc2626";
      statut.textContent = "⚠️ Indiquez un prix pour chaque photo ajoutée.";
      champ.focus();
      return false;
    }
  }

  bouton.disabled = true;
  statut.style.color = "#555";
  statut.textContent = "⏳ Envoi en cours...";

  try{
    const lienPosition = `https://www.google.com/maps?q=${lat},${lng}`;

    let texte = `📥 **Nouvelle demande d'inscription boutiquier**\n\n`;
    texte += `👤 Nom : ${nom}\n`;
    texte += `📞 Téléphone : ${telephone}\n`;
    texte += `📍 Position : ${lienPosition}\n\n`;
    texte += `**Articles proposés (voir photos jointes) :**\n`;

    photosAjoutees.forEach((photo, i) => {
      const champPrix = document.querySelector(`.prix-photo[data-photo-id="${photo.id}"]`);
      texte += `\n▪️ Photo ${i + 1} — ${Number(champPrix.value).toLocaleString("fr-FR")} FCFA`;
    });

    const donneesFormulaire = new FormData();
    donneesFormulaire.append("payload_json", JSON.stringify({ content: texte }));

    photosAjoutees.forEach((photo, i) => {
      donneesFormulaire.append(`files[${i}]`, photo.fichier, photo.fichier.name);
    });

    const reponse = await fetch(CONFIG.DISCORD_WEBHOOK_URL, {
      method: "POST",
      body: donneesFormulaire,
    });

    if(!reponse.ok) throw new Error("Réponse serveur incorrecte");

    document.getElementById("vue-formulaire").style.display = "none";
    document.getElementById("vue-merci-inscription").style.display = "block";

  } catch(erreur){
    console.error(erreur);
    statut.style.color = "#dc2626";
    statut.textContent = "❌ Erreur lors de l'envoi. Vérifiez votre connexion et réessayez (photos trop lourdes ?).";
  } finally {
    bouton.disabled = false;
  }

  return false;
}

</script>
</body>
</html>
